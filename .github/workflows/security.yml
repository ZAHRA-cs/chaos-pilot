name: Security Pipeline

on:
  push:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run secret scan
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --source . --no-git
        continue-on-error: true

      - name: Run dependency scan
        run: |
          pip install safety
          safety check -r canary/requirements.txt
          safety check -r gremlins/requirements.txt
          safety check -r medic/requirements.txt

      - name: Run image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'


      - name: Run code analysis
        run: |
          pip install bandit
          bandit -r canary/
          bandit -r gremlins/
          bandit -r medic/
